<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Highway Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="score">Score: 0</div>
        <div id="bombs-container">
            <div id="bombs"></div>
        </div>
        <div id="powerup-timer" style="display: none;"></div>
    </div>
    <div id="start-screen">
        <h1>Highway Shooter</h1>
        <p>Swipe or use WASD/Arrow keys to move.</p>
        <button id="start-button">Start Game</button>
    </div>
     <div id="game-over-screen" style="display: none;">
        <div id="game-over-content">
            <h1>Game Over</h1>
            <p>Your Score: <span id="final-score">0</span></p>
            <button id="watch-replay-button">Watch Instant Replay</button>
            <button id="restart-button">Restart</button>
        </div>
        <div id="replay-view" style="display: none;">
             <div id="replay-container"></div>
             <button id="back-to-score-button">Back</button>
        </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
            "react": "https://esm.sh/react@18.3.1?dev",
            "react-dom": "https://esm.sh/react-dom@18.3.1?dev",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
            "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
            "remotion": "https://esm.sh/remotion@4.0.350?external=react,react-dom&dev",
            "@remotion/player": "https://esm.sh/@remotion/player@4.0.350?external=react,react-dom&dev",
            "@websim/remotion/player": "https://esm.websim.com/@websim/remotion/player",
            "fflate": "https://esm.sh/fflate@0.8.2",
            "main": "./main.js",
            "game": "./game.js",
            "player": "./player.js",
            "projectile": "./projectile.js",
            "enemy": "./enemy.js",
            "barrel": "./barrel.js",
            "barrier": "./barrier.js",
            "particle": "./particle.js",
            "powerup": "./powerup.js",
            "input": "./input.js",
            "collision": "./collision.js",
            "audio": "./audio.js",
            "spawner": "./spawner.js",
            "collision-handler": "./collision-handler.js",
            "effect-manager": "./effect-manager.js",
            "bomb-explosion-effect": "./bomb-explosion-effect.js",
            "replay-recorder": "./replay-recorder.js",
            "replay-composition": "./replay-composition.jsx",
            "replay-player": "./replay-player.jsx"
        }
    }
    </script>
    <script type="module" src="main.js"></script>

</html>
